name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 v1.0.0)，留空则自动递增 patch 版本'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      - name: Build and package
        working-directory: worker
        run: node build.js

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          PLAIN_VERSION="${VERSION#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## [${PLAIN_VERSION}" '
              BEGIN { found=0 }
              $0 ~ ver { found=1; next }
              found && /^## \[/ { exit }
              found { print }
            ' CHANGELOG.md > /tmp/release_body.md
          fi
          if [ -s /tmp/release_body.md ]; then
            echo "has_changelog=true" >> $GITHUB_OUTPUT
          else
            echo "has_changelog=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release (from CHANGELOG.md)
        if: steps.changelog.outputs.has_changelog == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_body.md
          files: worker/cf-manager.zip

      - name: Create Release (auto-generated)
        if: steps.changelog.outputs.has_changelog != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: worker/cf-manager.zip

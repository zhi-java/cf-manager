name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      cf_api_key:
        description: 'Cloudflare Global API Key'
        required: true
        type: string
      cf_email:
        description: 'Cloudflare 账号邮箱'
        required: true
        type: string
      project_name:
        description: 'Pages 项目名称'
        required: false
        default: 'cfmgr'
        type: string
      d1_database_name:
        description: 'D1 数据库名称'
        required: false
        default: 'cfmgr'
        type: string
      kv_namespace_name:
        description: 'KV 命名空间名称（用于缓存和粘性路由）'
        required: false
        default: 'cfmgr'
        type: string
      encryption_key:
        description: '加密密钥（用于加密存储 API Token）'
        required: false
        default: 'cfmgrbest'
        type: string
      api_secret:
        description: '访问密码（留空则无需登录）'
        required: false
        default: 'cfmgrbest'
        type: string
      demo_account_ids:
        description: '演示模式保护的账户 ID（逗号分隔，如 1,2,3，留空则不启用）'
        required: false
        default: ''
        type: string
      full_wipe:
        description: '完全覆盖：删除并重建 D1 数据库 + 清空 KV 命名空间'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  CLOUDFLARE_API_KEY: ${{ github.event.inputs.cf_api_key }}
  CLOUDFLARE_EMAIL: ${{ github.event.inputs.cf_email }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Setup D1 database
        id: d1
        run: |
          DB_NAME="${{ github.event.inputs.d1_database_name }}"

          # --- 完全覆盖：删除旧数据库 ---
          if [ "${{ github.event.inputs.full_wipe }}" = "true" ]; then
            echo "完全覆盖模式：尝试删除旧 D1 数据库..."
            DB_OLD_ID=$(wrangler d1 list 2>&1 | grep -i "$DB_NAME" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")
            if [ -n "$DB_OLD_ID" ]; then
              echo "找到数据库 ID: $DB_OLD_ID，正在删除..."
              wrangler d1 delete "$DB_NAME" --yes 2>&1 || echo "通过名称删除失败，尝试通过 ID..."
              # 等待删除生效
              sleep 3
            else
              echo "未在列表中匹配到数据库，尝试按名称删除..."
              wrangler d1 delete "$DB_NAME" --yes 2>&1 || echo "数据库可能不存在或已被删除"
              sleep 2
            fi
          fi

          # 获取数据库 ID
          DB_LIST=$(wrangler d1 list 2>&1 || true)
          echo "$DB_LIST" | head -10
          DB_ID=$(echo "$DB_LIST" | grep -i "$DB_NAME" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || echo "")

          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database: $DB_NAME"
            wrangler d1 create "$DB_NAME"
            DB_LIST2=$(wrangler d1 list 2>&1)
            DB_ID=$(echo "$DB_LIST2" | grep -i "$DB_NAME" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            echo "Created database with ID: $DB_ID"

            echo "Initializing database schema..."
            wrangler d1 execute "$DB_NAME" --file=worker/src/db/schema.sql --remote
          else
            echo "Database already exists: $DB_NAME (ID: $DB_ID)"
            if [ "${{ github.event.inputs.full_wipe }}" = "true" ]; then
              echo "完全覆盖模式：清空所有表数据..."
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS quota_usage" --remote || true
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS audit_log" --remote || true
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS app_settings" --remote || true
              wrangler d1 execute "$DB_NAME" --command="DROP TABLE IF EXISTS accounts" --remote || true
              echo "重新初始化 Schema..."
              wrangler d1 execute "$DB_NAME" --file=worker/src/db/schema.sql --remote
            fi
          fi

          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Run D1 migrations
        run: |
          DB_NAME="${{ github.event.inputs.d1_database_name }}"
          # 为旧表添加新列（已存在则静默失败）
          wrangler d1 execute "$DB_NAME" --command="ALTER TABLE quota_usage ADD COLUMN optimistic INTEGER DEFAULT 0" --remote 2>/dev/null || true

      - name: Setup KV namespace
        id: kv
        run: |
          KV_NAME="${{ github.event.inputs.kv_namespace_name }}"

          # 尝试获取 account ID（可选，部分操作需要）
          ACCOUNT_ID=$(wrangler whoami 2>/dev/null | grep -oE '"account_id"\s*:\s*"[^"]*"' | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
          ACCOUNT_FLAG=""
          if [ -n "$ACCOUNT_ID" ]; then
            ACCOUNT_FLAG="--account-id $ACCOUNT_ID"
            echo "检测到 Account ID: $ACCOUNT_ID"
          fi

          # --- 完全覆盖：清空 KV ---
          if [ "${{ github.event.inputs.full_wipe }}" = "true" ]; then
            echo "完全覆盖模式：清空 KV 命名空间..."
            KV_LIST=$(wrangler kv namespace list 2>&1 || true)
            echo "$KV_LIST" | head -20
            KV_OLD_ID=$(echo "$KV_LIST" | grep -i "$KV_NAME" | grep -oE '[0-9a-f]{32}' | head -1 || echo "")
            if [ -n "$KV_OLD_ID" ]; then
              echo "删除旧 KV namespace: $KV_OLD_ID"
              wrangler kv namespace delete "$KV_OLD_ID" || true
              echo "等待删除生效..."
              sleep 5
            else
              echo "未找到同名 KV namespace，跳过删除"
            fi
          fi

          # 重新查找（可能已经被删除）
          KV_LIST=$(wrangler kv namespace list 2>&1 || true)
          KV_ID=$(echo "$KV_LIST" | grep -i "$KV_NAME" | grep -oE '[0-9a-f]{32}' | head -1 || echo "")

          if [ -z "$KV_ID" ]; then
            echo "Creating KV namespace: $KV_NAME"
            KV_OUTPUT=$(wrangler kv namespace create "$KV_NAME" $ACCOUNT_FLAG 2>&1 || true)
            echo "$KV_OUTPUT"
            KV_ID=$(echo "$KV_OUTPUT" | grep -oE '[0-9a-f]{32}' | head -1)
            if [ -z "$KV_ID" ]; then
              echo "ERROR: 无法创建 KV namespace"
              echo "请检查: 1) API Key 权限 2) KV namespace 配额 3) 账号下是否已有同名 namespace"
              exit 1
            fi
            echo "Created KV namespace with ID: $KV_ID"
          else
            echo "KV namespace already exists: $KV_NAME (ID: $KV_ID)"
          fi

          echo "kv_namespace_id=$KV_ID" >> $GITHUB_OUTPUT

      - name: Update wrangler.toml
        working-directory: worker
        run: |
          sed -i '/^main = /d' wrangler.toml
          sed -i '/^\[vars\]/,/^$/d' wrangler.toml
          sed -i "s/database_id = \".*\"/database_id = \"${{ steps.d1.outputs.database_id }}\"/" wrangler.toml
          sed -i "s/id = \"YOUR_KV_NAMESPACE_ID\"/id = \"${{ steps.kv.outputs.kv_namespace_id }}\"/" wrangler.toml
          sed -i "s/^name = \".*\"/name = \"${{ github.event.inputs.project_name }}\"/" wrangler.toml

      - name: Install worker dependencies
        working-directory: worker
        run: npm install

      - name: Build
        working-directory: worker
        run: node build.js

      - name: Create Pages project if not exists
        run: |
          wrangler pages project create "${{ github.event.inputs.project_name }}" --production-branch main 2>/dev/null || echo "Project already exists, skipping creation"

      - name: Configure secrets
        run: |
          echo "${{ github.event.inputs.encryption_key }}" | wrangler pages secret put ENCRYPTION_KEY --project-name "${{ github.event.inputs.project_name }}"
          if [ -n "${{ github.event.inputs.api_secret }}" ]; then
            echo "${{ github.event.inputs.api_secret }}" | wrangler pages secret put API_SECRET --project-name "${{ github.event.inputs.project_name }}"
          fi
          if [ -n "${{ github.event.inputs.demo_account_ids }}" ]; then
            echo "${{ github.event.inputs.demo_account_ids }}" | wrangler pages secret put DEMO_ACCOUNT_IDS --project-name "${{ github.event.inputs.project_name }}"
          fi

      - name: Bind KV to Pages project
        run: |
          echo "Binding KV namespace to Pages project..."
          wrangler pages deployment set-kv-bindings --project-name "${{ github.event.inputs.project_name }}" \
            --kv-namespace "${{ github.event.inputs.kv_namespace_name }}" \
            --binding-name KV 2>/dev/null || echo "KV binding 设置失败或已存在"

      - name: Deploy to Cloudflare Pages
        working-directory: worker
        run: wrangler pages deploy public/ --project-name "${{ github.event.inputs.project_name }}" --branch main --commit-dirty=true

      - name: Deployment summary
        run: |
          echo "## 部署完成 ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 配置项 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| CF 邮箱 | ${{ github.event.inputs.cf_email }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CF API Key | **** (已隐藏) |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages 项目 | ${{ github.event.inputs.project_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| D1 数据库 | ${{ github.event.inputs.d1_database_name }} (${{ steps.d1.outputs.database_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| KV 命名空间 | ${{ github.event.inputs.kv_namespace_name }} (${{ steps.kv.outputs.kv_namespace_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| 完全覆盖 | ${{ github.event.inputs.full_wipe }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 访问地址 | https://${{ github.event.inputs.project_name }}.pages.dev/admin/ |" >> $GITHUB_STEP_SUMMARY
